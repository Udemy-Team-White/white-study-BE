spring:
  # 1. DB 접속 설정
  datasource:
    # (⭐️수정됨) allowPublicKeyRetrieval=true 추가
    url: jdbc:mysql://localhost:3306/team_project_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: Study1234!
    driver-class-name: com.mysql.cj.jdbc.Driver

  # 2. JPA (ORM) 설정
  jpa:
    hibernate:
      # (⭐️수정됨) "update" -> "create"
      # DB를 싹 밀고, 님이 'Integer'로 작성한 Java 엔티티 기준으로 DB를 새로 짓습니다.
      ddl-auto: none
    properties:
      hibernate:
        # (JPA가 실행하는 SQL 쿼리문을 콘솔에 예쁘게 보여줌)
        show_sql: true
        format_sql: true

server:
  port: 8081